<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowmingo Gmail Prompt Tester</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; font-size: 14px; }
header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 16px; font-weight: 600; color: #fff; }
header .pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #2a2d3e; color: #94a3b8; }
.main { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 49px); overflow: hidden; }

/* ── Left panel: controls ── */
.left { border-right: 1px solid #2d3148; display: flex; flex-direction: column; overflow: hidden; }
.tabs { display: flex; border-bottom: 1px solid #2d3148; }
.tab { flex: 1; padding: 8px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; transition: all .15s; }
.tab.active { color: #818cf8; border-bottom-color: #818cf8; }
.tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; }

/* Editor */
.editor-wrap { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 8px; overflow: hidden; }
.editor-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; display: flex; justify-content: space-between; align-items: center; }
.badge-unsaved { display: none; width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; }
.badge-unsaved.show { display: inline-block; }
textarea { flex: 1; width: 100%; background: #161922; border: 1px solid #2d3148; color: #e2e8f0; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.5; padding: 10px; resize: none; border-radius: 6px; outline: none; }
textarea:focus { border-color: #4f46e5; }
.btn-row { display: flex; gap: 8px; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: #4f46e5; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #4338ca; }
.btn-secondary { background: #1e2130; color: #94a3b8; border: 1px solid #2d3148; }
.btn-secondary:hover:not(:disabled) { background: #252840; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.save-status { font-size: 11px; color: #22c55e; display: none; }
.save-status.show { display: inline; }

/* Sample picker */
.sample-panel { display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow: hidden; }
.sample-panel .section-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
select { width: 100%; background: #161922; border: 1px solid #2d3148; color: #e2e8f0; padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; }
select:focus { border-color: #4f46e5; }
.email-preview { background: #161922; border: 1px solid #2d3148; border-radius: 6px; padding: 10px; font-size: 12px; flex: 1; overflow-y: auto; }
.email-preview .ep-from { font-weight: 600; color: #a5b4fc; margin-bottom: 3px; }
.email-preview .ep-subject { color: #94a3b8; margin-bottom: 6px; font-style: italic; }
.email-preview .ep-body { color: #cbd5e1; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.run-controls { display: flex; gap: 8px; }

/* ── Right panel: results ── */
.right { display: flex; flex-direction: column; overflow-y: auto; padding: 16px; gap: 14px; }

/* Cards */
.card { background: #161922; border: 1px solid #2d3148; border-radius: 8px; overflow: hidden; }
.card-header { padding: 8px 14px; background: #1a1d27; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; color: #94a3b8; }
.card-body { padding: 12px 14px; }
.card-body pre { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #cbd5e1; }

/* Severity badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: .05em; }
.badge-PASS { background: #052e16; color: #4ade80; border: 1px solid #166534; }
.badge-LOW { background: #172554; color: #60a5fa; border: 1px solid #1e40af; }
.badge-MEDIUM { background: #431407; color: #fb923c; border: 1px solid #9a3412; }
.badge-HIGH { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
.badge-BUG { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
.badge-REVIEW { background: #1c1917; color: #fbbf24; border: 1px solid #92400e; }
.badge-READY { background: #052e16; color: #4ade80; border: 1px solid #166534; }
.badge-ERR { background: #1c1917; color: #f87171; border: 1px solid #450a0a; }

/* Key-value grid */
.kv { display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px; font-size: 12px; }
.kv-key { color: #64748b; font-weight: 500; white-space: nowrap; }
.kv-val { color: #e2e8f0; word-break: break-word; }
.kv-match { color: #4ade80; }
.kv-mismatch { color: #f87171; }

/* Draft preview */
.draft-text { background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 12px; font-size: 13px; line-height: 1.6; color: #e2e8f0; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; }

/* Comparison layout */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.compare-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }

/* Timing bar */
.timing-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #64748b; flex-wrap: wrap; }
.timing-chip { background: #1a1d27; border: 1px solid #2d3148; padding: 2px 7px; border-radius: 4px; }

/* Loading state */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #2d3148; border-top-color: #818cf8; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Issues list */
.issue-item { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; font-size: 12px; color: #fca5a5; }
.issue-item::before { content: '⚠'; flex-shrink: 0; }

/* Collapsible */
.collapsible-toggle { cursor: pointer; color: #4f46e5; font-size: 11px; user-select: none; }
.collapsible-toggle:hover { text-decoration: underline; }
.collapsible-body { display: none; }
.collapsible-body.open { display: block; }

/* Scenario match indicator */
.scenario-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.scenario-match { background: #052e16; color: #4ade80; border: 1px solid #166534; }
.scenario-miss  { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
.scenario-noexp { background: #172554; color: #60a5fa; border: 1px solid #1e40af; }
</style>
</head>
<body>
<header>
  <h1>Flowmingo Gmail Prompt Tester</h1>
  <span class="pill" id="sampleCount">loading…</span>
  <span class="pill" id="serverStatus" style="background:#052e16;color:#4ade80">connected</span>
</header>

<div class="main">
  <!-- Left panel -->
  <div class="left">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('run')">Run</div>
      <div class="tab" onclick="switchTab('rules')">Rules SOP</div>
      <div class="tab" onclick="switchTab('scenarios')">Scenarios SOP</div>
    </div>

    <!-- Run tab -->
    <div class="tab-panel active" id="tab-run">
      <div class="sample-panel">
        <div class="section-label">Sample Email</div>
        <select id="sampleSelect" onchange="onSampleChange()">
          <option value="">Select a sample…</option>
        </select>
        <div class="email-preview" id="emailPreview">
          <div style="color:#4b5563;font-style:italic">Select a sample to preview it here</div>
        </div>
        <div class="run-controls">
          <button class="btn btn-primary" id="btnRun" onclick="runPipeline()">
            Run Pipeline
          </button>
          <button class="btn btn-secondary" id="btnRunBoth" onclick="runBoth()">
            Compare (bak vs current)
          </button>
        </div>
      </div>
    </div>

    <!-- Rules SOP tab -->
    <div class="tab-panel" id="tab-rules">
      <div class="editor-wrap">
        <div class="editor-label">
          flowmingo-rules.md
          <span class="badge-unsaved" id="rulesUnsaved"></span>
        </div>
        <textarea id="rulesEditor" placeholder="Loading…" oninput="onEditorChange('rules')"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="saveRules()">Save</button>
          <button class="btn btn-secondary btn-sm" onclick="loadBakRules()">Restore Backup</button>
          <span class="save-status" id="rulesSaveStatus">Saved!</span>
        </div>
      </div>
    </div>

    <!-- Scenarios SOP tab -->
    <div class="tab-panel" id="tab-scenarios">
      <div class="editor-wrap">
        <div class="editor-label">
          flowmingo-scenarios.md
          <span class="badge-unsaved" id="scenariosUnsaved"></span>
        </div>
        <textarea id="scenariosEditor" placeholder="Loading…" oninput="onEditorChange('scenarios')"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="saveScenarios()">Save</button>
          <button class="btn btn-secondary btn-sm" onclick="loadBakScenarios()">Restore Backup</button>
          <span class="save-status" id="scenariosSaveStatus">Saved!</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel: results -->
  <div class="right" id="resultsPanel">
    <div style="color:#4b5563;font-style:italic;margin:auto;text-align:center">
      Select a sample and click Run Pipeline
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let savedRulesContent    = "";
let savedScenariosContent = "";
let currentSample        = null;
let isRunning            = false;

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadSamples(), loadRules(), loadScenarios()]);
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const panels = ['run','rules','scenarios'];
    t.classList.toggle('active', panels[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Samples ────────────────────────────────────────────────────────────────
async function loadSamples() {
  const r = await fetch('/samples');
  const { samples } = await r.json();
  const sel = document.getElementById('sampleSelect');
  sel.innerHTML = '<option value="">Select a sample…</option>';
  samples.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s.replace('.json', '');
    sel.appendChild(opt);
  });
  document.getElementById('sampleCount').textContent = `${samples.length} samples`;
}

async function onSampleChange() {
  const name = document.getElementById('sampleSelect').value;
  if (!name) { currentSample = null; return; }
  const r = await fetch('/sample/' + name);
  currentSample = await r.json();
  renderEmailPreview(currentSample);
}

function renderEmailPreview(s) {
  const p = document.getElementById('emailPreview');
  p.innerHTML = `
    <div class="ep-from">${esc(s.from || '')}</div>
    <div class="ep-subject">${esc(s.subject || '')}</div>
    <div style="font-size:11px;color:#4b5563;margin-bottom:6px">
      msgs: ${s.message_count || 1} |
      has_reply: ${s.has_support_reply || false} |
      expected: <b style="color:#818cf8">${s.expected_scenario || '?'}</b>
    </div>
    <div class="ep-body">${esc((s.latest_message || '').slice(0, 500))}</div>
    ${s.thread_context ? `<div style="margin-top:8px;font-size:11px;color:#4b5563;font-style:italic">Thread: ${esc(s.thread_context.slice(0, 200))}</div>` : ''}
  `;
}

// ── SOP Editors ───────────────────────────────────────────────────────────
async function loadRules() {
  const r = await fetch('/prompt');
  if (r.ok) {
    const { content } = await r.json();
    document.getElementById('rulesEditor').value = content;
    savedRulesContent = content;
  }
}

async function loadScenarios() {
  const r = await fetch('/prompt2');
  if (r.ok) {
    const { content } = await r.json();
    document.getElementById('scenariosEditor').value = content;
    savedScenariosContent = content;
  }
}

function onEditorChange(which) {
  if (which === 'rules') {
    const changed = document.getElementById('rulesEditor').value !== savedRulesContent;
    document.getElementById('rulesUnsaved').classList.toggle('show', changed);
  } else {
    const changed = document.getElementById('scenariosEditor').value !== savedScenariosContent;
    document.getElementById('scenariosUnsaved').classList.toggle('show', changed);
  }
}

async function saveRules() {
  const content = document.getElementById('rulesEditor').value;
  await fetch('/prompt', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content}) });
  savedRulesContent = content;
  document.getElementById('rulesUnsaved').classList.remove('show');
  flashStatus('rulesSaveStatus');
}

async function saveScenarios() {
  const content = document.getElementById('scenariosEditor').value;
  await fetch('/prompt2', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({content}) });
  savedScenariosContent = content;
  document.getElementById('scenariosUnsaved').classList.remove('show');
  flashStatus('scenariosSaveStatus');
}

async function loadBakRules() {
  if (!confirm('Restore original backup? This will overwrite your current edits.')) return;
  const r = await fetch('/prompt-bak');
  if (r.ok) {
    const { content } = await r.json();
    document.getElementById('rulesEditor').value = content;
    await saveRules();
  }
}

async function loadBakScenarios() {
  if (!confirm('Restore original backup? This will overwrite your current edits.')) return;
  const r = await fetch('/prompt2-bak');
  if (r.ok) {
    const { content } = await r.json();
    document.getElementById('scenariosEditor').value = content;
    await saveScenarios();
  }
}

function flashStatus(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Pipeline ───────────────────────────────────────────────────────────────
async function runPipeline() {
  if (isRunning || !currentSample) return;
  setRunning(true);
  const sampleName = document.getElementById('sampleSelect').value;

  renderLoading();
  try {
    const r = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sample_name: sampleName })
    });
    const result = await r.json();
    renderResults(result);
  } catch (ex) {
    renderError(ex.message);
  }
  setRunning(false);
}

async function runBoth() {
  if (isRunning || !currentSample) return;
  setRunning(true);
  const sampleName = document.getElementById('sampleSelect').value;

  renderLoadingBoth();
  try {
    const r = await fetch('/run-both', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sample_name: sampleName })
    });
    const { old: oldR, new: newR } = await r.json();
    renderCompare(oldR, newR);
  } catch (ex) {
    renderError(ex.message);
  }
  setRunning(false);
}

function setRunning(v) {
  isRunning = v;
  document.getElementById('btnRun').disabled = v;
  document.getElementById('btnRunBoth').disabled = v;
  if (v) {
    document.getElementById('btnRun').innerHTML = '<span class="spinner"></span> Running…';
    document.getElementById('btnRunBoth').innerHTML = '<span class="spinner"></span> Running…';
  } else {
    document.getElementById('btnRun').textContent = 'Run Pipeline';
    document.getElementById('btnRunBoth').textContent = 'Compare (bak vs current)';
  }
}

// ── Render helpers ─────────────────────────────────────────────────────────
function renderLoading() {
  document.getElementById('resultsPanel').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;color:#64748b;margin:auto">
      <span class="spinner"></span> Running pipeline…
    </div>`;
}
function renderLoadingBoth() {
  document.getElementById('resultsPanel').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;color:#64748b;margin:auto">
      <span class="spinner"></span> Running bak + current…
    </div>`;
}
function renderError(msg) {
  document.getElementById('resultsPanel').innerHTML = `
    <div class="card"><div class="card-body">
      <span class="badge badge-ERR">ERROR</span>
      <pre style="margin-top:8px">${esc(msg)}</pre>
    </div></div>`;
}

function renderResults(r) {
  const panel = document.getElementById('resultsPanel');
  if (r.error) { renderError(r.error); return; }

  const route   = r.route || {};
  const node1   = r.node1 || {};
  const node2   = r.node2 || {};
  const valid   = r.validation || {};
  const label   = r.label || 'FM/review';
  const timings = r.timings || {};

  const scenarioMatch = r.expected_scenario && r.model_scenario
    ? r.model_scenario === r.expected_scenario ? 'match' : 'miss'
    : 'noexp';

  const draftBody = valid.fixed_draft || node2.draft_body || '';

  panel.innerHTML = `
    <!-- Summary row -->
    <div class="card">
      <div class="card-header">
        Result Summary
        <span class="badge badge-${label === 'FM/ready' ? 'READY' : label === 'FM/bug' ? 'BUG' : 'REVIEW'}">${label}</span>
        <span class="badge badge-${valid.severity || 'PASS'}">${valid.severity || 'N/A'}</span>
        ${r.expected_scenario ? `<span class="scenario-chip scenario-${scenarioMatch}">${r.model_scenario || '?'} ${scenarioMatch === 'match' ? '✓' : scenarioMatch === 'miss' ? `✗ (expected: ${r.expected_scenario})` : ''}</span>` : `<span class="scenario-chip scenario-noexp">${r.model_scenario || '?'}</span>`}
        <span style="margin-left:auto" class="timing-row">
          ${timings.route_ms != null ? `<span class="timing-chip">route ${timings.route_ms}ms</span>` : ''}
          ${timings.node1_ms != null ? `<span class="timing-chip">N1 ${timings.node1_ms}ms</span>` : ''}
          ${timings.node2_ms != null ? `<span class="timing-chip">N2 ${timings.node2_ms}ms</span>` : ''}
          ${timings.total_ms != null ? `<span class="timing-chip">total ${timings.total_ms}ms</span>` : ''}
        </span>
      </div>
      <div class="card-body">
        <div class="kv">
          <span class="kv-key">From</span>      <span class="kv-val">${esc(r.from || '')}</span>
          <span class="kv-key">Subject</span>   <span class="kv-val">${esc(r.subject || '')}</span>
          <span class="kv-key">Scenario</span>  <span class="kv-val">${esc(r.model_scenario || '?')} (conf: ${((r.scenario_confidence || 0)*100).toFixed(0)}%)</span>
          <span class="kv-key">Contract</span>  <span class="kv-val">${esc(r.contract_id || 'FALLBACK')}</span>
          <span class="kv-key">Sender type</span><span class="kv-val">${esc(node1.sender_type || route.sender_type || '?')}</span>
          <span class="kv-key">Intent</span>    <span class="kv-val">${esc(node1.intent_direction || '?')}</span>
          ${r.label_reason ? `<span class="kv-key">Review reason</span><span class="kv-val" style="color:#f59e0b">${esc(r.label_reason)}</span>` : ''}
          ${node1.input_tokens != null ? `<span class="kv-key">Tokens</span><span class="kv-val">N1: ${(node1.input_tokens||0)+(node1.output_tokens||0)} | N2: ${(node2.input_tokens||0)+(node2.output_tokens||0)}</span>` : ''}
        </div>
      </div>
    </div>

    <!-- Route / Rules Engine -->
    <div class="card">
      <div class="card-header">Phase 1 — rules_engine.route()</div>
      <div class="card-body">
        <div class="kv">
          <span class="kv-key">sender_type</span>    <span class="kv-val">${esc(route.sender_type || '?')}</span>
          <span class="kv-key">is_bug</span>         <span class="kv-val">${route.is_bug ? '<span style="color:#f87171">true</span>' : 'false'}</span>
          <span class="kv-key">risk_triggers</span>  <span class="kv-val">${esc(JSON.stringify(route.risk_triggers || []))}</span>
          <span class="kv-key">pre_route_hint</span> <span class="kv-val">${esc(route.pre_route_hint || '')}</span>
        </div>
      </div>
    </div>

    <!-- Node 1 -->
    ${node1.scenario ? `
    <div class="card">
      <div class="card-header">Phase 2 — Node 1: Intent Classifier</div>
      <div class="card-body">
        <div class="kv">
          <span class="kv-key">scenario</span>     <span class="kv-val">${esc(node1.scenario || '')}</span>
          <span class="kv-key">confidence</span>   <span class="kv-val">${((node1.scenario_confidence||0)*100).toFixed(0)}%</span>
          <span class="kv-key">intent</span>       <span class="kv-val">${esc(node1.intent_direction || '')}</span>
          <span class="kv-key">sender_type</span>  <span class="kv-val">${esc(node1.sender_type || '')}</span>
          <span class="kv-key">topic</span>        <span class="kv-val">${esc(node1.topic || '')}</span>
          <span class="kv-key">is_bug</span>       <span class="kv-val">${node1.is_bug ? '<span style="color:#f87171">true</span>' : 'false'}</span>
          <span class="kv-key">hint</span>         <span class="kv-val">${esc(node1.classification_hint || '')}</span>
        </div>
        ${node1.reviewer_briefing ? `<div style="margin-top:8px;font-size:12px;color:#fbbf24;white-space:pre-wrap">${esc(node1.reviewer_briefing)}</div>` : ''}
        ${node1.route_reasoning ? `<div style="margin-top:6px;font-size:11px;color:#64748b;white-space:pre-wrap">${esc(node1.route_reasoning)}</div>` : ''}
      </div>
    </div>` : ''}

    <!-- Validation -->
    ${valid.severity ? `
    <div class="card">
      <div class="card-header">
        Phase 4 — Validators
        <span class="badge badge-${valid.severity}">${valid.severity}</span>
        <span style="font-size:11px;color:#64748b">score: ${valid.validator_score != null ? valid.validator_score.toFixed(2) : 'N/A'}</span>
      </div>
      <div class="card-body">
        ${(valid.issues||[]).length > 0
          ? (valid.issues||[]).map(i => `<div class="issue-item">${esc(i)}</div>`).join('')
          : '<span style="color:#4ade80;font-size:12px">No issues found</span>'
        }
      </div>
    </div>` : ''}

    <!-- Draft -->
    ${draftBody ? `
    <div class="card">
      <div class="card-header">Draft Reply</div>
      <div class="card-body">
        <div class="draft-text">${esc(draftBody)}</div>
      </div>
    </div>` : ''}
  `;
}

function renderCompare(oldR, newR) {
  const panel = document.getElementById('resultsPanel');
  panel.innerHTML = `
    <div class="compare-grid">
      <div>
        <div class="compare-label" style="color:#f59e0b">ORIGINAL (bak)</div>
        ${renderResultCard(oldR)}
      </div>
      <div>
        <div class="compare-label" style="color:#4ade80">CURRENT</div>
        ${renderResultCard(newR)}
      </div>
    </div>`;
}

function renderResultCard(r) {
  if (!r || r.error) {
    return `<div class="card"><div class="card-body"><span class="badge badge-ERR">ERROR</span><pre style="margin-top:8px">${esc(r?.error || 'Unknown error')}</pre></div></div>`;
  }

  const valid  = r.validation || {};
  const node1  = r.node1 || {};
  const node2  = r.node2 || {};
  const label  = r.label || 'FM/review';
  const timings = r.timings || {};
  const draftBody = valid.fixed_draft || node2.draft_body || '';
  const scenarioMatch = r.expected_scenario && r.model_scenario
    ? r.model_scenario === r.expected_scenario ? 'match' : 'miss'
    : 'noexp';

  return `
    <div class="card">
      <div class="card-header">
        <span class="badge badge-${label === 'FM/ready' ? 'READY' : label === 'FM/bug' ? 'BUG' : 'REVIEW'}">${label}</span>
        <span class="badge badge-${valid.severity || 'PASS'}">${valid.severity || 'N/A'}</span>
        <span class="scenario-chip scenario-${scenarioMatch}">${r.model_scenario || '?'}</span>
        <span class="timing-chip" style="margin-left:auto;font-size:11px">${(timings.total_ms||0)}ms</span>
      </div>
      <div class="card-body">
        <div class="kv" style="margin-bottom:8px">
          <span class="kv-key">Scenario</span> <span class="kv-val">${esc(r.model_scenario||'?')} (${((r.scenario_confidence||0)*100).toFixed(0)}%)</span>
          <span class="kv-key">Sender</span>   <span class="kv-val">${esc(node1.sender_type || r.route?.sender_type || '?')}</span>
          ${r.label_reason ? `<span class="kv-key">Reason</span><span class="kv-val" style="color:#f59e0b;font-size:11px">${esc(r.label_reason)}</span>` : ''}
        </div>
        ${(valid.issues||[]).length > 0
          ? `<div style="margin-bottom:8px">${(valid.issues||[]).map(i => `<div class="issue-item">${esc(i)}</div>`).join('')}</div>`
          : ''
        }
        ${draftBody ? `<div class="draft-text" style="max-height:280px;font-size:12px">${esc(draftBody)}</div>` : ''}
      </div>
    </div>`;
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
